<div class="main">
  <h1>Vilácio 255047</h1><br>
  <h1>Sandro 253897</h1>
  <input class="lg-text-input" #campoNovoItem
    (keyup.enter)="CREATE_tarefa(campoNovoItem.value); campoNovoItem.value=''" />
  <button class="btn-primary" (click)="CREATE_tarefa(campoNovoItem.value); campoNovoItem.value=''">
    Adicionar Tarefa</button>
  <ul>
    <li *ngFor="let tarefaDoLoop of arrayDeTarefas()">
      <app-item [tarefa]="tarefaDoLoop" (remover)="DELETE_tarefa($event)"
        (modificaTarefa)="UPDATE_tarefa(tarefaDoLoop)">>
      </app-item>
    </li>
  </ul>
</div>
